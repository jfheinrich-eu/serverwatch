name: Build and Release
permissions:
  contents: write
  pull-requests: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/version = ".*"/version = "${{ steps.get_version.outputs.version }}"/' pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Update CHANGELOG
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ steps.get_version.outputs.tag_name }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_version.outputs.tag_name }}
          name: "Release ${{ steps.get_version.outputs.tag_name }}"
          body: ${{ steps.changelog.outputs.changes }}
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated pyproject.toml and CHANGELOG.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: develop
          commit_message: "chore: update version to ${{ steps.get_version.outputs.version }} and CHANGELOG [skip ci]"
          file_pattern: pyproject.toml CHANGELOG.md
