name: Build and Release
permissions:
    contents: write
    pull-requests: write
    issues: write

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash

        steps:
            - name: Harden the runner (StepSecurity)
              uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.12.2
              with:
                  egress-policy: audit
                  allowed-endpoints: |
                      github.com:443
                      tech.jfheinrich.eu:443
                      pypi.org:443
                      files.pythonhosted.org:443
                      api.github.com:443
                      objects.githubusercontent.com:443
                      raw.githubusercontent.com:443
                      uploads.github.com:443

            - name: Checkout code
              uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
              with:
                  python-version: "3.12"

            - name: Extract version from tag
              id: get_version
              run: |
                  TAG_NAME=${GITHUB_REF#refs/tags/}
                  VERSION=${TAG_NAME#v}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

            - name: Update version in pyproject.toml
              run: |
                  sed -i 's/version = ".*"/version = "${{ steps.get_version.outputs.version }}"/' pyproject.toml

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install build twine

            - name: Build package
              run: python -m build

            - name: Update CHANGELOG
              id: changelog
              uses: requarks/changelog-action@6d71e098526ee17bae963f058d34cd763378337f # v1.10.2
              with:
                  token: ${{ github.token }}
                  tag: ${{ steps.get_version.outputs.tag_name }}

            - name: Create Release
              uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
              with:
                  tag: ${{ steps.get_version.outputs.tag_name }}
                  name: "Release ${{ steps.get_version.outputs.tag_name }}"
                  body: ${{ steps.changelog.outputs.changes }}
                  artifacts: "dist/*"
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Create PR to sync develop branch
              uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  base: develop
                  branch: release-sync-${{ github.run_id }}
                  title: "🔄 Sync develop after release ${{ steps.get_version.outputs.tag_name }}"
                  body: |
                      ## Release Sync: ${{ steps.get_version.outputs.tag_name }}

                      This PR automatically syncs the develop branch after releasing tag `${{ steps.get_version.outputs.tag_name }}`.

                      ### Changes:
                      - Updates version to ${{ steps.get_version.outputs.version }} in pyproject.toml
                      - Updates CHANGELOG.md with release notes

                      **Auto-generated by GitHub Actions**
                  commit-message: "chore: update version to ${{ steps.get_version.outputs.version }} and CHANGELOG [skip ci]"
                  delete-branch: true
                  draft: false
