name: Integration Test

permissions:
    contents: read
    pull-requests: write

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    integration-test:
        name: Integration Test # This name must match the required check
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (StepSecurity)
              uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.12.2
              with:
                  egress-policy: audit
                  allowed-endpoints: |
                      github.com:443
                      pypi.org:443
                      files.pythonhosted.org:443

            - name: Skip for dependabot
              if: ${{ github.actor == 'dependabot[bot]' }}
              run: |
                  echo "⏭️ Skipping integration tests for dependabot PR"
                  echo "This is a dependabot PR, integration tests are not required"
                  echo "Status: PASSED"
                  exit 0

            - name: Checkout code
              if: ${{ github.actor != 'dependabot[bot]' }}
              uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

            - name: Set up Python
              if: ${{ github.actor != 'dependabot[bot]' }}
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
              with:
                  python-version: "3.12"

            - name: Install package
              if: ${{ github.actor != 'dependabot[bot]' }}
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"

            - name: Run integration tests
              if: ${{ github.actor != 'dependabot[bot]' }}
              run: |
                  pytest tests/ -v --tb=short

            - name: Report final status
              if: always()
              run: |
                  if [ "${{ job.status }}" = "success" ]; then
                      echo "✅ Integration tests completed successfully"
                      echo "Status: PASSED"
                      exit 0
                  elif [ "${{ job.status }}" = "failure" ]; then
                      echo "❌ Integration tests failed"
                      echo "Status: FAILED"
                      exit 1
                  elif [ "${{ job.status }}" = "cancelled" ]; then
                      echo "⏹️ Integration tests cancelled"
                      echo "Status: CANCELLED"
                      exit 1
                  else
                      echo "❓ Integration tests completed with unknown status: ${{ job.status }}"
                      echo "Status: UNKNOWN"
                      exit 1
                  fi
