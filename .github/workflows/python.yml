name: Python CI
permissions:
    contents: write
    pull-requests: write

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    lint-and-test:
        name: Lint and Test
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.9", "3.10", "3.11", "3.12"]

        steps:
            - uses: jfheinrich-eu/psono-secret-whisperer@v1.0.0
              id: psono-secrets
              with:
                  ci_api_key_id: ${{ secrets.PSONO_API_KEY_ID }}
                  ci_api_secret_key_hex: ${{ secrets.PSONO_API_SECRET_KEY_HEX }}
                  ci_server_url: ${{ vars.PSONO_SERVER_URL }}
                  secret_id: ${{ secrets.PSONO_BARECHECK_ENVIRONMENT }}
                  secret_type: "env" # pragma: allowlist secret
                  secret_fields: "BARECHECK_GITHUB_APP_TOKEN,API_KEY_PIPREQS_ACTION" # pragma: allowlist secret
                  mask_secrets: "BARECHECK_GITHUB_APP_TOKEN,API_KEY_PIPREQS_ACTION" # pragma: allowlist secret

            - uses: jwalton/gh-find-current-pr@v1.3.3
              id: findPr
              with:
                  # Can be "open", "closed", or "all".  Defaults to "open".
                  state: open

            - name: Checkout code
              uses: actions/checkout@v4.2.2

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5.6.0
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"

            - name: Lint with flake8
              run: |
                  flake8 src tests

            - name: Lint with pylint
              run: |
                  pylint src

            - name: Check formatting with black
              run: |
                  black --check src tests

            - name: Check import sorting with isort
              run: |
                  isort --check-only src tests

            - name: Type check with mypy
              run: |
                  mypy src

            - name: Security check with bandit
              run: |
                  bandit -r src

            - name: Run tests with pytest
              run: |
                  pytest tests/ --cov=src --cov-branch --cov-report=xml --cov-report=html

            - name: Upload coverage to Codecov
              if: matrix.python-version == '3.12'
              uses: codecov/codecov-action@v5.4.3
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: ${{ github.repository }}
                  files: ./coverage.xml
                  verbose: true

            - name: Generate Code Coverage report
              id: code-coverage
              if: matrix.python-version == '3.12' && success() && steps.findPr.outputs.number
              uses: barecheck/code-coverage-action@v1
              with:
                  barecheck-github-app-token: ${{ steps.psono-secrets.outputs.secret1 }}
                  barecheck-api-key: ${{ steps.psono-secrets.outputs.secret2 }}
                  lcov-file: "coverage/cov.info"
                  pull-number: ${{ steps.findPr.outputs.number }}
                  send-summary-comment: true
                  show-annotations: "warning"

    update-requirements:
        name: Update Requirements for PR
        runs-on: ubuntu-latest
        # Only run on pull requests targeting develop, excluding dependabot PRs
        if: >
            github.event_name == 'pull_request' &&
            github.event.pull_request.base.ref == 'develop' &&
            !startsWith(github.actor, 'dependabot')

        steps:
            - name: Checkout PR source code
              uses: actions/checkout@v4.2.2
              with:
                  # Check out the PR source branch (head)
                  ref: ${{ github.head_ref }}
                  # Use a PAT to allow pushing back to the PR branch
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Python
              uses: actions/setup-python@v5.6.0
              with:
                  python-version: "3.12"

            - name: Install dependencies for analysis
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"
                  pip install pipreqs toml

            # FIXME: Commented out due to bug in pipreqs-action removing dev dependencies.
            #        See https://github.com/jfheinrich-eu/pipreqs-action/issues/93 for details.
            #        Plan: Revisit this step and check for a fix or workaround
            #        in pipreqs-action monthly (next review: September 2025).
            #
            # - name: Generate requirements.txt (BUGGY)
            #   uses: jfheinrich-eu/pipreqs-action@v4.4.0
            #   with:
            #       PROJECT_PATH: src
            #       REQUIREMENT_PATH: requirements.txt
            #       RECURSIVE: "true"

            - name: Extract runtime dependencies from imports
              run: |
                  echo "🔍 Analyzing runtime dependencies from imports..."
                  pipreqs src --force --print > runtime_deps.txt || echo "# No runtime dependencies detected" > runtime_deps.txt
                  echo "Runtime dependencies found:"
                  cat runtime_deps.txt

            - name: Extract development dependencies from pyproject.toml
              run: |
                  echo "🛠️ Extracting development dependencies..."
                  python3 -c "
                  import toml

                  try:
                      with open('pyproject.toml', 'r') as f:
                          data = toml.load(f)

                      dev_deps = []
                      optional_deps = data.get('project', {}).get('optional-dependencies', {})

                      for group_name, deps in optional_deps.items():
                          for dep in deps:
                              if dep not in dev_deps:
                                  dev_deps.append(dep)

                      with open('dev_deps.txt', 'w') as f:
                          if dev_deps:
                              f.write('\n'.join(sorted(dev_deps)) + '\n')
                          else:
                              f.write('# No development dependencies found\n')

                      print(f'Found {len(dev_deps)} development dependencies')

                  except Exception as e:
                      print(f'Error: {e}')
                      with open('dev_deps.txt', 'w') as f:
                          f.write('# Error extracting dev dependencies\n')
                  "
                  echo "Development dependencies found:"
                  cat dev_deps.txt

            - name: Generate comprehensive requirements.txt
              run: |
                  echo "📝 Creating comprehensive requirements.txt..."

                  # Create header
                  cat > requirements.txt << 'EOF'
                  # Generated automatically - DO NOT EDIT MANUALLY
                  # This file contains both runtime and development dependencies
                  # Runtime dependencies are extracted from actual imports in src/
                  # Development dependencies are extracted from pyproject.toml

                  # ===== RUNTIME DEPENDENCIES =====
                  # Dependencies required for the package to run
                  EOF

                  # Add runtime dependencies
                  if [ -s runtime_deps.txt ] && ! grep -q "No runtime dependencies detected" runtime_deps.txt; then
                      cat runtime_deps.txt >> requirements.txt
                  else
                      echo "# No runtime dependencies detected" >> requirements.txt
                  fi

                  # Add development section
                  cat >> requirements.txt << 'EOF'

                  # ===== DEVELOPMENT DEPENDENCIES =====
                  # Dependencies required for development, testing, and building
                  EOF

                  # Add development dependencies
                  cat dev_deps.txt >> requirements.txt

                  # Clean up temporary files
                  rm -f runtime_deps.txt dev_deps.txt

                  echo "✅ Generated comprehensive requirements.txt"
                  echo "📄 Content preview:"
                  head -20 requirements.txt

            - name: Check if requirements.txt changed
              id: check-changes
              run: |
                  if git diff --quiet requirements.txt; then
                    echo "changed=false" >> $GITHUB_OUTPUT
                    echo "✅ No changes in requirements.txt"
                  else
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "📝 Changes detected in requirements.txt"
                    echo "Diff:"
                    git diff requirements.txt
                  fi

            - name: Commit updated requirements.txt to PR branch
              if: steps.check-changes.outputs.changed == 'true'
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  branch: ${{ github.head_ref }}
                  commit_message: "chore: update requirements.txt [skip ci]"
                  file_pattern: requirements.txt

            - name: Add comment to PR if requirements updated
              if: steps.check-changes.outputs.changed == 'true'
              uses: actions/github-script@v7.0.1
              with:
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: '🔄 **Requirements updated!** \n\nThe `requirements.txt` file has been automatically updated based on the current dependencies in your PR. The changes have been committed to this PR branch.'
                      })

            - name: No changes notification
              if: steps.check-changes.outputs.changed == 'false'
              run: |
                  echo "ℹ️ Requirements.txt is already up to date - no commit needed."
