name: Python CI
permissions:
    contents: write
    pull-requests: write

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    lint-and-test:
        name: Lint and Test
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.9", "3.10", "3.11", "3.12"]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"

            - name: Lint with flake8
              run: |
                  flake8 src tests

            - name: Lint with pylint
              run: |
                  pylint src

            - name: Check formatting with black
              run: |
                  black --check src tests

            - name: Check import sorting with isort
              run: |
                  isort --check-only src tests

            - name: Type check with mypy
              run: |
                  mypy src

            - name: Security check with bandit
              run: |
                  bandit -r src

            - name: Run tests with pytest
              run: |
                  pytest tests/ --cov=src --cov-report=xml --cov-report=html

            - name: Upload coverage to Codecov
              if: matrix.python-version == '3.12'
              uses: codecov/codecov-action@v4
              with:
                  file: ./coverage.xml
                  flags: unittests
                  name: codecov-umbrella

    update-requirements:
        name: Update Requirements for PR
        runs-on: ubuntu-latest
        # Only run on pull requests targeting develop, excluding dependabot PRs
        if: >
            github.event_name == 'pull_request' &&
            github.event.pull_request.base.ref == 'develop' &&
            !startsWith(github.actor, 'dependabot')

        steps:
            - name: Checkout PR source code
              uses: actions/checkout@v4
              with:
                  # Check out the PR source branch (head)
                  ref: ${{ github.head_ref }}
                  # Use a PAT to allow pushing back to the PR branch
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Generate requirements.txt
              uses: jfheinrich-eu/pipreqs-action@v4.1.0
              with:
                  PROJECT_PATH: src
                  REQUIREMENT_PATH: requirements.txt
                  RECURSIVE: "true"

            - name: Check if requirements.txt changed
              id: check-changes
              run: |
                  if git diff --quiet requirements.txt; then
                    echo "changed=false" >> $GITHUB_OUTPUT
                    echo "✅ No changes in requirements.txt"
                  else
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "📝 Changes detected in requirements.txt"
                    echo "Diff:"
                    git diff requirements.txt
                  fi

            - name: Commit updated requirements.txt to PR branch
              if: steps.check-changes.outputs.changed == 'true'
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  branch: ${{ github.head_ref }}
                  commit_message: "chore: update requirements.txt [skip ci]"
                  file_pattern: requirements.txt

            - name: Add comment to PR if requirements updated
              if: steps.check-changes.outputs.changed == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: '🔄 **Requirements updated!** \n\nThe `requirements.txt` file has been automatically updated based on the current dependencies in your PR. The changes have been committed to this PR branch.'
                      })

            - name: No changes notification
              if: steps.check-changes.outputs.changed == 'false'
              run: |
                  echo "ℹ️ Requirements.txt is already up to date - no commit needed."
