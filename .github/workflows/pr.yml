name: Release Info
permissions:
    contents: read
    pull-requests: write

on:
    pull_request:
        types:
            [
                labeled,
                unlabeled,
                opened,
                edited,
                reopened,
                synchronize,
                ready_for_review,
            ]

jobs:
    labeler:
        permissions:
            contents: write
            pull-requests: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/labeler@v5.0.0
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

    generate-pr-description:
        name: Generate the description on the pull request
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash

        steps:
            - uses: actions/checkout@v5

            - uses: octue/generate-pull-request-description@1.0.0.beta-2
              id: pr-description
              with:
                  pull_request_url: ${{ github.event.pull_request.url }}
                  api_token: ${{ secrets.GITHUB_TOKEN }}

            - name: Update pull request body
              uses: riskledger/update-pr-description@v2
              with:
                  body: ${{ steps.pr-description.outputs.pull_request_description }}
                  token: ${{ secrets.GITHUB_TOKEN }}

    check-pr:
        if: ${{ github.actor != 'dependabot[bot]' }}
        needs: [labeler, generate-pr-description]
        name: Validate Release Label and Notes
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Validate Pull Request Metadata
              uses: jefflinse/pr-semver-bump@v1.7.3
              with:
                  mode: validate
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  major-label: major release
                  minor-label: minor release
                  patch-label: patch release
                  noop-labels: |
                      documentation change
                      dependencies
                      skip-release
                  require-release-notes: true
                  release-notes-prefix: "<!--- START AUTOGENERATED NOTES --->"
                  release-notes-suffix: "<!--- END AUTOGENERATED NOTES --->"
                  with-v: false
                  base-branch: false
